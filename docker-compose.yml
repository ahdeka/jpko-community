services:
  postgres:
    image: postgres:16
    container_name: jpko-postgres
    environment:
      POSTGRES_DB: jpko_community
      POSTGRES_USER: jpko
      POSTGRES_PASSWORD: jpko1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: