spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/jpko_community
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  secret: ${JWT_SECRET}

cookie:
  secure: true
  same-site: Lax
  domain: jpkocommunity.site

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET}
    cloudfront:
      domain: d1q5c7pfmil9a2.cloudfront.net
    region:
      static: ap-northeast-2

mail:
  base-url: https://www.jpkocommunity.site